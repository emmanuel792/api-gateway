services:
  nginx:
    image: nginx:latest
    container_name: nginx-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: always
    networks:
      - homelab_net

  home-assistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: always
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Argentina/Buenos_Aires
    # Si necesitas descubrimiento automático de dispositivos (mDNS/DLNA),
    # usa 'network_mode: host' en lugar de la red bridge.
    networks:
      - homelab_net
    ports:
      - "8123:8123"
    # Privileged es útil si vas a conectar dongles USB (Zigbee/Bluetooth)
    privileged: true

networks:
  homelab_net:
    external: true
